---
- name: Ensure SSL directory exists
  file:
    path: /usr/local/apache2/conf/ssl
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [ssl, setup]

# Generate private key if missing
- name: Generate SSL private key
  command: >
    openssl genrsa -out {{ ssl_key_path }} 2048
  args:
    creates: "{{ ssl_key_path }}"
  tags: [ssl, key]

# Generate CSR if missing
- name: Generate SSL CSR
  command: >
    openssl req -new -key {{ ssl_key_path }} -out /usr/local/apache2/conf/ssl/server.csr
    -subj "/C=PH/ST=Calabarzon/L=Binangonan/O=MyCompany/OU=IT/CN={{ ssl_server_name }}"
  args:
    creates: "/usr/local/apache2/conf/ssl/server.csr"
  tags: [ssl, csr]

# Generate self-signed certificate if missing
- name: Generate self-signed SSL certificate
  command: >
    openssl x509 -req -days 365 -in /usr/local/apache2/conf/ssl/server.csr
    -signkey {{ ssl_key_path }} -out {{ ssl_cert_path }}
  args:
    creates: "{{ ssl_cert_path }}"
  tags: [ssl, cert]

# Create chain file (server cert + self-signed root)
- name: Create SSL chain file
  shell: cat {{ ssl_cert_path }} > {{ ssl_chain_path }}
  args:
    creates: "{{ ssl_chain_path }}"
  tags: [ssl, chain]

- name: Configure Apache SSL virtual host
  template:
    src: vhost-ssl.conf.j2
    dest: /usr/local/apache2/conf/extra/vhost-ssl.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart apache
  tags: [ssl, config]
