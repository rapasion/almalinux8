- name: Download Apache source
  get_url:
    url: "{{ apache_url }}"
    dest: "/usr/local/src/httpd-{{ apache_version }}.tar.gz"
  tags: [apache, download, debug]

- name: Extract Apache source
  unarchive:
    src: "/usr/local/src/httpd-{{ apache_version }}.tar.gz"
    dest: "/usr/local/src"
    remote_src: yes

#- name: Gather installed packages
#  package_facts:
 #   manager: auto
 # tags: [apache, build, debug]

- name: Compile and install Apache
  shell: |
    cd /usr/local/src/httpd-{{ apache_version }}
    ./configure --prefix={{ apache_prefix }} \
                --enable-so \
                --enable-ssl \
                --enable-rewrite \
                --with-mpm=event \
           #     --with-included-apr \
                --enable-mods-shared=all

    make
    make install
  args:
    creates: "{{ apache_prefix }}/bin/httpd"
  tags: [apache, build, debug]    

- name: Add Apache to PATH
  copy:
    dest: /etc/profile.d/apache.sh
    content: |
      export PATH=$PATH:{{ apache_prefix }}/bin

- name: Ensure Apache runs as apache user
  lineinfile:
    path: "{{ apache_prefix }}/conf/httpd.conf"
    regexp: '^User'
    line: 'User apache'
    state: present
  notify: restart apache

- name: Ensure Apache runs as apache group
  lineinfile:
    path: "{{ apache_prefix }}/conf/httpd.conf"
    regexp: '^Group'
    line: 'Group apache'
    state: present
  notify: restart apache  

- name: Create systemd service
  template:
    src: httpd.service.j2
    dest: /etc/systemd/system/httpd.service

- name: Enable and start Apache
  systemd:
    name: httpd
    enabled: yes
    state: started

- name: Ensure SELinux context for htdocs
  command: chcon -R -t httpd_sys_content_t {{ apache_prefix }}/htdocs
  args:
    warn: false    
