---
- name: Install Apache build dependencies
  dnf:
    name:
      - gcc
      - make
      - wget
      - tar
      - apr-devel
      - apr-util-devel
      - pcre-devel
      - openssl-devel
      - expat-devel
      - zlib-devel
      - libnghttp2-devel
      - jansson-devel
      - libcurl-devel
      - redhat-rpm-config
    state: present
  tags: [apache, build, debug]

