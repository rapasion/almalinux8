---
- name: Install Apache HTTP Server from source
  hosts: all
  become: yes

  vars:
    apache_version: "2.4.59"
    apache_prefix: "/usr/local/apache2"
    apache_url: "https://downloads.apache.org/httpd/httpd-{{ apache_version }}.tar.gz"

  tasks:
    # 1. Install build dependencies
    - name: Install required packages
      dnf:
        name:
          - gcc
          - make
          - wget
          - tar
          - apr-devel
          - apr-util-devel
          - pcre-devel
          - openssl-devel
          - expat-devel
        state: present

    # 2. Download Apache source
    - name: Download Apache source tarball
      get_url:
        url: "{{ apache_url }}"
        dest: "/usr/local/src/httpd-{{ apache_version }}.tar.gz"
        remote_src: yes

    # 3. Extract source
    - name: Extract Apache source
      unarchive:
        src: "/usr/local/src/httpd-{{ apache_version }}.tar.gz"
        dest: "/usr/local/src"
        remote_src: yes

    # 4. Configure, compile, install
    - name: Compile and install Apache
      shell: |
        cd /usr/local/src/httpd-{{ apache_version }}
        ./configure --prefix={{ apache_prefix }} \
                    --enable-so \
                    --enable-ssl \
                    --enable-rewrite \
                    --with-mpm=event \
                    --with-included-apr \
                    --enable-mods-shared=all
        make
        make install
      args:
        creates: "{{ apache_prefix }}/bin/httpd"

    # 5. Add Apache to PATH
    - name: Add Apache to PATH
      copy:
        dest: /etc/profile.d/apache.sh
        content: |
          export PATH=$PATH:{{ apache_prefix }}/bin

    # 6. Create systemd service
    - name: Create Apache systemd service
      copy:
        dest: /etc/systemd/system/httpd.service
        content: |
          [Unit]
          Description=Apache HTTP Server
          After=network.target

          [Service]
          Type=forking
          ExecStart={{ apache_prefix }}/bin/apachectl start
          ExecStop={{ apache_prefix }}/bin/apachectl stop
          ExecReload={{ apache_prefix }}/bin/apachectl graceful
          PIDFile={{ apache_prefix }}/logs/httpd.pid
          Restart=always

          [Install]
          WantedBy=multi-user.target

    # 7. Enable and start Apache
    - name: Enable and start Apache service
      systemd:
        name: httpd
        enabled: yes
        state: started
